services:
  db:
    image: postgres:15
    container_name: qa-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # SEGURANÇA: Em produção, NÃO exponha a porta do banco para o host.
    # Defina DB_PORT_EXPOSED apenas em desenvolvimento local.
    # Para produção, remova o bloco "ports" abaixo inteiramente.
    ports:
      - "${DB_PORT_EXPOSED:-}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d

  db-test:
    image: postgres:15
    container_name: qa-db-test
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_TEST:-qa_control_test}
    ports:
      - "${DB_TEST_PORT_EXPOSED:-5434}:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: qa-backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      REGISTER_TOKEN: ${REGISTER_TOKEN}
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  frontend:
    build: ./frontend
    container_name: qa-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  pgdata:
  pgdata-test: